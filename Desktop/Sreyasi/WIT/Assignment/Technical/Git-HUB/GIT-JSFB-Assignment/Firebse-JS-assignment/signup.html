<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday-checker</title>     
    <link href="styles.css" rel="stylesheet">    
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container" style="display: flex; justify-content: space-between; width: auto">            
            <a class="navbar-brand" href="#">
                <img src="./resources/image/bdayChckr_logo.png" alt="Logo.png" width="75" height="60">
            </a>
            <h1>!!Welcome to Birthday-checker App!!</h1>
            <form class="d-flex justify-content-end" >
                <!--span class="navbar-text" id="welcome_text">Hello,User!</span>
                <button class="btn" type="submit">Log Out</button-->
            </form>                                    
        </div>
    </nav>
    <br>
    <br>
    <div class="container" id="starting_content">        
        <button type="submit" id="Initial_login">START</button>
    </div>  
    <br>
    <br>
   <form class="container" id="login_form">
        <h3>LOGIN DETAILS</h3>
        <br>
        <div>
            <label for="reg-username">Name:</label>
            <input type="text" id="reg-name" name="username">
        </div>
        <br>
        <br>
        <div>
            <label for="reg-email">Email:</label>
            <input type="email" id="reg-email" name="email" required>
        </div>
        <br>
        <br>
        <div id="birthday_input">
            <label for="birthday" >Birthday:</label>
            <input type="date" id="reg-birthday" name="birthday" required>
        </div>
        <br>
        <br>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="reg-password" name="password"
            pattern="^(?=.*\d)(?=.*[a-zA-Z])(?=.*[^a-zA-Z0-9])\S{8,}$" 
                   title="Password must contain at least one number, 
                           one alphabet, one symbol, and be at 
                           least 8 characters long" required>
        </div>       
        <br> 
        <br>
        <button type="submit" id="LoginBtn">Sign In</button>        
    </form> 
    <div class="container" id="signup_content">
        <p><strong>If you are a new user, sign up</strong>
            <button type="submit" id="RegisterBtn">Sign Up</button>
        </p>
    </div>

    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="./js/config.js" type="module"></script>
    <script src="./js/login.js" type="module"></script>
    <script src="./js/authentication.js" type="module"></script>
    <script src="./js/datahandling.js" type="module"></script>
</body>
</html>
